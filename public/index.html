<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IP Chat Name</title>
    <link rel="stylesheet" href="styles.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body data-theme="dark">
    <header class="header">
        <div class="logo">
            <span class="logo-icon">🔌</span>
            <h1>IP Chat Name</h1>
        </div>
        <div class="header-right">
            <button onclick="toggleTheme()" class="theme-btn">🌙</button>
            <div id="header-room-info" class="room-info hidden">
                <span id="room-id-display" class="room-id"></span>
                <button onclick="copyRoomLink()" class="copy-btn">Share</button>
                <button onclick="exitRoom()" class="exit-btn">Exit</button>
            </div>
        </div>
    </header>

    <!-- Home View -->
    <div id="home-view" class="view active">
        <div class="home-container">
            <div class="hero">
                <h2>Create or Join Secure Chat</h2>
                <p>Private • Group • Self-destructing rooms</p>
            </div>

            <div class="card">
                <div class="input-group">
                    <label>Nickname</label>
                    <input type="text" id="nickname-input" placeholder="Your name" maxlength="20">
                </div>

                <div class="create-options">
                    <button onclick="createRoom(false)" class="btn-primary">Private Chat (2 users)</button>
                    <button onclick="createRoom(true)" class="btn-primary">Create Group</button>
                </div>

                <div class="expiry-selector">
                    <label>Room expires in</label>
                    <select id="expiry-time">
                        <option value="15">15 minutes</option>
                        <option value="30" selected>30 minutes</option>
                        <option value="60">1 hour</option>
                        <option value="180">3 hours</option>
                        <option value="360">6 hours</option>
                        <option value="1440">24 hours</option>
                    </select>
                </div>

                <div class="divider">OR</div>

                <div class="input-group">
                    <label>Room ID</label>
                    <div class="join-wrapper">
                        <input type="text" id="room-code-input" placeholder="ABC12345" maxlength="8" style="text-transform:uppercase">
                        <button onclick="joinRoomFromHome()" class="btn-join">Join</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chat View -->
    <div id="chat-view" class="view hidden">
        <div class="chat-layout">
            <!-- Sidebar -->
            <div class="participants-sidebar">
                <div class="sidebar-header">
                    <h3>Participants <span id="participant-count" class="count-badge"></span></h3>
                    <span id="online-status" class="online-status">● Online</span>
                </div>
                <div id="participants-list" class="participants-list"></div>
            </div>

            <!-- Main Chat -->
            <div class="chat-main">
                <div id="chat-messages" class="messages-container"></div>

                <div class="typing-indicator" id="typing-indicator">Someone is typing...</div>

                <div class="message-input-area">
                    <form id="message-form" onsubmit="sendMessage(event)">
                        <input type="text" id="message-input" placeholder="Type message..." autocomplete="off">
                        <button type="button" onclick="triggerImageUpload()" class="attach-btn">📸</button>
                        <button type="button" onclick="startVoiceRecording()" class="attach-btn">🎤</button>
                        <button type="submit" class="send-btn">➤</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="file-upload" accept="image/*,audio/*" style="display:none" onchange="handleFileSelect(event)">

    <!-- Modals -->
    <div id="join-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Join Room <span id="modal-room-id" class="room-id"></span></h2>
            <input type="text" id="modal-nickname" placeholder="Your nickname" maxlength="20">
            <div class="modal-buttons">
                <button onclick="cancelJoinModal()" class="btn-secondary">Cancel</button>
                <button onclick="confirmJoinFromModal()" class="btn-primary">Join</button>
            </div>
        </div>
    </div>

    <div id="closed-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Room Closed</h2>
            <p id="closed-reason"></p>
            <button onclick="goBackToHome()" class="btn-primary">Back to Home</button>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="script.js"></script>
</body>
                            </html>
